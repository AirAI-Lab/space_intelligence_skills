version: '3.8'

# 加载统一 IP 配置
env_file:
  - ../.env.ip

services:
  # PostgreSQL + TimescaleDB 时序数据库（免费 + MIT/Apache协议）
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: edge_cloud_postgres
    environment:
      POSTGRES_DB: edge_cloud
      POSTGRES_USER: edge_user
      POSTGRES_PASSWORD: edge_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edge-cloud-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edge_user -d edge_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 启用TimescaleDB扩展
    command: >
      postgres
      -c shared_preload_libraries='timescaledb'

  # Redis 缓存（BSD协议 - 完全免费）
  redis:
    image: redis:7-alpine
    container_name: edge_cloud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edge-cloud-network
    restart: unless-stopped

  # 中文导航门户
  portal:
    image: nginx:alpine
    container_name: edge_cloud_portal
    ports:
      - "8889:80"
    volumes:
      - ./portal.html:/usr/share/nginx/html/index.html:ro
    networks:
      - edge-cloud-network
    restart: unless-stopped

  # EMQX MQTT Broker（Apache 2.0 - 完全免费）
  emqx:
    image: emqx/emqx:5.5.0
    container_name: edge_cloud_emqx
    environment:
      EMQX_NAME: emqx
      # 设置默认管理员账号密码
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123456
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - edge-cloud-network
    restart: unless-stopped

  # MLflow 模型管理（Apache 2.0 - 完全免费）
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: edge_cloud_mlflow
    ports:
      - "5001:5000"
    environment:
      BACKEND_STORE_URI: /mlflow/data
      DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/data --default-artifact-root /mlflow/artifacts
    networks:
      - edge-cloud-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SeaweedFS 对象存储（Apache 2.0 - 完全免费，商业化友好）
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: edge_cloud_seaweedfs
    ports:
      - "8333:8333"  # S3 API
      - "8080:8080"  # 主服务
      - "8888:8888"  # UI界面
    volumes:
      - seaweedfs_data:/data
    environment:
      - GOCACHE=/tmp
    command: server -dir=/data -s3 -volume.max=100
    networks:
      - edge-cloud-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --timeout=10 http://127.0.0.1:8333/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # 前端服务 (Vue3 + TypeScript) - 开发模式
  frontend:
    image: node:21-alpine
    container_name: edge_cloud_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - DOCKER_ENV=true
      - VITE_API_BASE_URL=/api/v1
      - VITE_WS_URL=ws://localhost:8081/ws
    volumes:
      # 开发模式：挂载源码目录（热重载）
      - ../../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    networks:
      - edge-cloud-network
    restart: unless-stopped

  # 后端 API 服务 (Spring Boot 3.x) - 开发模式
  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: edge_cloud_backend
    working_dir: /app
    ports:
      - "8081:8080"
      - "5005:5005"  # 远程调试端口
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=docker,dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/edge_cloud
      - SPRING_DATASOURCE_USERNAME=edge_user
      - SPRING_DATASOURCE_PASSWORD=edge_pass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_MQTT_BROKER_URL=tcp://emqx:1883
      # TimescaleDB配置（替代InfluxDB）
      - TIMESTRIDE_ENABLED=true
      - TIMESTRIDE_URI=jdbc:postgresql://postgres:5432/edge_cloud_timeseries
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - TRAINING_SERVICE_URL=http://edge_cloud_training:5002
      # SeaweedFS S3存储配置（Apache 2.0，商业化友好）
      - FILE_STORAGE_TYPE=s3
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=admin123456
      - S3_BUCKET=edge-cloud-files
      - S3_PATH_STYLE_ACCESS=true
      # 外部访问URL配置（设备下载文件用，根据实际网络修改）
      # 注意：此IP应与 .env.ip 中的 CLOUD_IP 保持一致
      - BACKEND_EXTERNAL_URL=${CLOUD_API_URL}
      # 开发模式配置（暂时禁用JDWP调试以加快启动）
      # - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:5005
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_LIVE_RELOAD_ENABLED=true
    depends_on:
      - postgres
      - redis
      - emqx
      - seaweedfs
    volumes:
      # 开发模式：挂载源码目录（热重载）
      - ../../backend:/app
      - ~/.m2:/root/.m2  # Maven 本地仓库缓存
      - file_storage_data:/app/data/files
      - ../../data/work:/app/work  # 共享训练输出目录，用于访问 ONNX 文件
    command:
      - /bin/bash
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq tzdata &&
        ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime &&
        echo 'Asia/Shanghai' > /etc/timezone &&
        mvn spring-boot:run
    networks:
      - edge-cloud-network
    restart: unless-stopped

  # 训练服务 (PyTorch + YOLO + CUDA) - 需要使用 --profile gpu 启动
  training:
    build:
      context: ../../training
      dockerfile: ../deployment/docker/training.Dockerfile
    container_name: edge_cloud_training
    runtime: nvidia
    shm_size: '16gb'  # 增加共享内存以支持多 workers 数据加载
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      # 后端 API 配置
      - BACKEND_API_URL=http://backend:8080
      # S3 存储配置
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_EXTERNAL_ENDPOINT=http://192.168.0.103:8333
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=admin123456
      - S3_BUCKET=edge-cloud-files
      # MQTT 配置
      - MQTT_BROKER_URL=tcp://emqx:1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=admin123456
      # GPU 配置
      - USE_GPU=true
    volumes:
      # 开发模式：挂载源码目录（热重载）
      - ../../training:/app
      # 数据目录
      - ../../data/runs:/app/runs
      - ../../data/models:/app/models
      - ../../data/shared_models:/shared:ro
      - ../../data/work:/app/work
      # 文件存储
      - file_storage_data:/app/data/files:ro
      - ../../data/datasets:/app/data/datasets:rw
    ports:
      - "5002:5002"
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 16G
        reservations:
          memory: 8G
    networks:
      - edge-cloud-network
    restart: unless-stopped
    profiles:
      - gpu

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  emqx_data:
  seaweedfs_data:
  file_storage_data:
  training_work:
  # 移除的volumes: influxdb_data, minio_data, grafana_data

networks:
  edge-cloud-network:
    driver: bridge

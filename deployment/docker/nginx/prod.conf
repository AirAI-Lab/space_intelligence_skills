# SkyEdge AI Cloud Platform - Nginx 统一反向代理
# 所有服务通过单一入口访问，不暴露内部端口
#
# 访问方式：
#   http://{HOST}/           → 前端管理界面
#   http://{HOST}/api/       → 后端 REST API
#   http://{HOST}/ws         → WebSocket (STOMP)
#   http://{HOST}/s3/        → 文件存储 S3 API
#   http://{HOST}/mlflow/    → MLflow 模型管理
#   http://{HOST}/mqtt/ws    → MQTT over WebSocket
#   http://{HOST}/emqx/      → EMQX 管理面板

upstream backend {
    server backend:8080;
}

upstream frontend {
    server frontend:80;
}

upstream seaweedfs_s3 {
    server seaweedfs:8333;
}

upstream mlflow {
    server mlflow:5000;
}

upstream emqx_ws {
    server emqx:8083;
}

upstream emqx_dashboard {
    server emqx:18083;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # ---- 前端 ----
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- 后端 REST API ----
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- WebSocket (STOMP) ----
    location /ws {
        proxy_pass http://backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- 文件存储 S3 API ----
    location /s3/ {
        proxy_pass http://seaweedfs_s3/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;

        # 文件下载直接通过后端 API 转发更安全
        # 这里提供直连 S3 能力给需要 SDK 访问的场景
    }

    # ---- MLflow ----
    location /mlflow/ {
        proxy_pass http://mlflow/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /mlflow;
    }

    # ---- MQTT over WebSocket ----
    location /mqtt/ws {
        proxy_pass http://emqx_ws/mqtt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ---- EMQX 管理面板 ----
    location /emqx/ {
        proxy_pass http://emqx_dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- 健康检查 ----
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

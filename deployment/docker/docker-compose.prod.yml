# ============================================
# 生产部署 Docker Compose 配置
# ============================================
#
# 与开发模式的区别：
#   - 后端/前端使用预构建镜像（多阶段 Dockerfile），不再挂载源码
#   - Nginx 统一反向代理（所有服务通过 80/443 端口访问）
#   - 资源限制、健康检查、日志限制
#   - 训练服务可选启用（--profile gpu）
#
# 使用方式：
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile gpu up -d  # 含训练服务
#
# ============================================

services:
  # ---------- 基础设施 ----------

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: edge_cloud_postgres
    environment:
      POSTGRES_DB: edge_cloud
      POSTGRES_USER: edge_user
      POSTGRES_PASSWORD: ${PG_PASSWORD:-admin123456}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edge-cloud
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edge_user -d edge_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c shared_preload_libraries='timescaledb'
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: edge_cloud_redis
    volumes:
      - redis_data:/data
    networks:
      - edge-cloud
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M

  emqx:
    image: emqx/emqx:5.5.0
    container_name: edge_cloud_emqx
    environment:
      EMQX_NAME: emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-admin123456}
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - edge-cloud
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT TCP — 边缘设备原生 MQTT 客户端需要直连
    expose:
      - "8083"         # MQTT WebSocket（通过 nginx /mqtt/ws 代理）

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: edge_cloud_seaweedfs
    volumes:
      - seaweedfs_data:/data
    environment:
      - GOCACHE=/tmp
    command: server -dir=/data -s3 -volume.max=100
    networks:
      - edge-cloud
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --timeout=10 http://127.0.0.1:8333/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # S3 API 不对外暴露，通过 nginx 代理
    expose:
      - "8333"
      - "8080"
      - "8888"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: edge_cloud_mlflow
    environment:
      BACKEND_STORE_URI: /mlflow/data
      DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/data --default-artifact-root /mlflow/artifacts
    networks:
      - edge-cloud
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "5000"

  rtmp:
    image: alfg/nginx-rtmp:latest
    container_name: rtmp-server
    ports:
      - "1935:1935"
    networks:
      - edge-cloud
    restart: unless-stopped

  # ---------- 业务服务（预构建镜像） ----------

  backend:
    build:
      context: ../../backend
      dockerfile: ../deployment/docker/backend.Dockerfile
    image: edge-cloud/backend:${VERSION:-latest}
    container_name: edge_cloud_backend
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=docker,prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/edge_cloud
      - SPRING_DATASOURCE_USERNAME=edge_user
      - SPRING_DATASOURCE_PASSWORD=${PG_PASSWORD:-admin123456}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_MQTT_BROKER_URL=tcp://emqx:1883
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - TRAINING_SERVICE_URL=http://training:5002
      - FILE_STORAGE_TYPE=s3
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=admin123456
      - S3_BUCKET=edge-cloud-files
      - S3_PATH_STYLE_ACCESS=true
      - API_KEY=${API_KEY:-admin123456}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      emqx:
        condition: service_started
      seaweedfs:
        condition: service_healthy
    volumes:
      - file_storage_data:/app/data/files
    networks:
      - edge-cloud
    restart: unless-stopped
    ports:
      - "8081:8080"   # 后端 API — 边缘设备注册/心跳/推理结果上报需要直连
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
    image: edge-cloud/frontend:${VERSION:-latest}
    container_name: edge_cloud_frontend
    networks:
      - edge-cloud
    restart: unless-stopped
    expose:
      - "80"

  # ---------- 统一入口 ----------

  nginx:
    image: nginx:alpine
    container_name: edge_cloud_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - emqx
      - seaweedfs
      - mlflow
    networks:
      - edge-cloud
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------- 可选服务 ----------

  training:
    build:
      context: ../../training
      dockerfile: ../deployment/docker/training.Dockerfile
    image: edge-cloud/training:${VERSION:-latest}
    container_name: edge_cloud_training
    runtime: nvidia
    shm_size: '16gb'
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # CUDA_VISIBLE_DEVICES: 不设置 — 自动使用全部 GPU，训练脚本 --device 选择
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - BACKEND_API_URL=http://backend:8080
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=admin123456
      - S3_BUCKET=edge-cloud-files
      - MQTT_BROKER_URL=tcp://emqx:1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=${EMQX_PASSWORD:-admin123456}
      - USE_GPU=true
    volumes:
      - ../../data/runs:/app/runs
      - ../../data/models:/app/output_models
      - ../../data/datasets:/app/data/datasets:rw
      - ../../models:/app/models
    networks:
      - edge-cloud
    restart: unless-stopped
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          memory: 8G

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  emqx_data:
  seaweedfs_data:
  file_storage_data:

networks:
  edge-cloud:
    driver: bridge

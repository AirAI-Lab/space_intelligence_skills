# ==============================================================================
# 变换检测配置文件 v1.3
# ==============================================================================
#
# 分层检测策略:
#   L1 场景: 快速识别场景类型 (城市/农村/水域等)
#   L2 目标: 检测具体目标 (违建/车辆/垃圾等)
#   L3 变化: 前后帧对比
#
# v1.3 变更:
#   - 移除 building/road/parking_lot/water/farmland 等宽泛类别
#     (这些类别与窄类别竞争，导致 bare_ground 等目标无法检测)
#   - 保留告警相关类别 + vegetation/background
#
# 类别参考:
#   - Construction Detection 数据集 (蓝色雨棚/绿色棚屋/其他违建)
#   - 城市治理常见场景 (违停/垃圾/占道等)
#
# 作者: 空中智能体团队
# 日期: 2026-05-07
# ==============================================================================

system:
  name: change_detection
  version: '1.3'
  device: cuda
  description: 云端变换检测系统 (分层检测)

cloud:
  radio:
    model:
      version: c-radio_v4-h
      path: /app/models/C-RADIOv4-H/c-radio_v4-h_half.pth.tar
      radio_code_dir: /app/models/NVlabs_RADIO
      siglip2_dir: /app/models/siglip2-giant-opt-patch16-384
      adaptor_names:
        - siglip2-g
        - dino_v3_7b
      device: cuda
      use_scra: true
      use_dino: true
      use_sam: false
      temperature: 50.0

    segmentation:
      threshold: 0.25
      input_size: 896

    change_detection:
      min_change_area: 0.003
      min_iou_match: 0.3
      score_threshold: 0.3

    # ==================================================================
    # L1 场景分类 (5 类, 粗粒度)
    # ==================================================================
    scene_classes:
      urban:
        zh: 城市区域
        prompts:
          - urban area with buildings and roads from aerial view
          - cityscape with dense residential or commercial buildings
          - town or village with clustered houses and streets

      agricultural:
        zh: 农业区域
        prompts:
          - farmland with crop fields and agricultural plots
          - rice paddy or wheat field from aerial view
          - greenhouse or agricultural facility area

      water_body:
        zh: 水域
        prompts:
          - river lake or reservoir from aerial view
          - coastline beach or harbor area
          - pond or water channel

      mountain_forest:
        zh: 山林区域
        prompts:
          - mountainous terrain with slopes and valleys
          - dense forest area with tree canopy coverage
          - hilly region with natural vegetation

      industrial:
        zh: 工业区域
        prompts:
          - industrial park with factories and warehouses
          - construction site with machinery and scaffolding
          - port or logistics area with containers and cranes

    # ==================================================================
    # L2 目标检测 (11 类, 仅保留告警相关 + 参考)
    # ==================================================================
    classes:
      # --- 违建检测 ---
      blue_canopy:
        zh: 蓝色雨棚
        prompts:
          - bright blue tarp or canopy covering on building rooftop from aerial view
          - blue colored metal sheet or plastic shelter structure on roof top
          - blue waterproof fabric awning stretched over building surface
        prompts_negative:
          - blue sky above buildings
          - blue painted wall or blue colored roof tile
        alert:
          enabled: true
          level: warning
          description: 检测到蓝色雨棚，可能存在违建

      green_shack:
        zh: 绿色棚屋
        prompts:
          - green colored temporary shed or shack structure on rooftop
          - green metal sheet or fiberglass shelter cabin built on building top
          - bright green portable housing or storage hut on roof
        prompts_negative:
          - green trees and vegetation
          - green grass lawn
        alert:
          enabled: true
          level: warning
          description: 检测到绿色棚屋，可能存在违建

      illegal_extension:
        zh: 违章搭建
        prompts:
          - unauthorized extension or additional room built on building rooftop
          - makeshift structure with metal sheets and bricks added on top of building
          - illegally constructed enclosure or room on roof with different material
        prompts_negative:
          - original building structure
          - balcony or terrace
        alert:
          enabled: true
          level: warning
          description: 检测到疑似违建

      # --- 交通检测 ---
      vehicle:
        zh: 机动车辆
        prompts:
          - car sedan or SUV vehicle parked on road or open ground
          - truck van or minibus with visible rectangular body shape
          - passenger vehicle with four wheels on street or parking area
        prompts_negative:
          - construction excavator or bulldozer
          - bicycle or motorcycle
        alert:
          enabled: true
          level: info
          description: 检测到车辆

      construction_vehicle:
        zh: 工程车辆
        prompts:
          - yellow excavator with mechanical arm on construction site
          - large crane or concrete mixer truck at building site
          - bulldozer or heavy construction machinery with tracked wheels
        prompts_negative:
          - regular passenger car
          - truck on highway
        alert:
          enabled: true
          level: info
          description: 检测到工程车辆

      # --- 城市治理 ---
      debris_dump:
        zh: 垃圾堆放
        prompts:
          - messy pile of mixed construction waste debris and garbage on open ground
          - scattered trash rubbish and discarded materials dumped illegally on roadside
          - disorderly heap of broken bricks concrete chunks and plastic waste
        prompts_negative:
          - neatly stacked building materials
          - organized construction supplies
        alert:
          enabled: true
          level: warning
          description: 检测到垃圾堆放，可能存在违规倾倒

      material_stock:
        zh: 建材堆放
        prompts:
          - neatly stacked steel bars bricks or construction materials on ground
          - ordered pile of sand gravel aggregate or cement bags at site
          - organized building supplies and raw materials stored in construction area
        prompts_negative:
          - scattered garbage and trash
          - debris and demolition waste
        alert:
          enabled: true
          level: info
          description: 检测到建材堆放

      enclosure_fence:
        zh: 围挡围栏
        prompts:
          - temporary metal sheet fence or blue hoarding barrier around construction site
          - safety barrier or enclosure wall separating work zone from public area
          - vertical fence panels forming perimeter around building site
        prompts_negative:
          - permanent brick wall
          - building facade
        alert:
          enabled: true
          level: info
          description: 检测到围挡

      scaffolding:
        zh: 脚手架
        prompts:
          - tall scaffolding structure with steel pipes around building exterior
          - metal frame support system with cross bars on building facade
          - exterior construction framework and platform on building wall
        prompts_negative:
          - building balcony railing
          - electrical power lines
        alert:
          enabled: true
          level: info
          description: 检测到脚手架

      # --- 环境参考 ---
      vegetation:
        zh: 植被
        prompts:
          - green trees with dense canopy coverage from aerial view
          - grass lawn or shrubs covering ground surface
          - dense green vegetation area with natural organic texture
        prompts_negative:
          - green colored artificial structure or roof
          - bare brown soil without plants
        alert:
          enabled: false

      bare_ground:
        zh: 裸土
        prompts:
          - large area of exposed bare dry yellow brown soil without any covering
          - uncovered earth dirt ground with visible rough soil texture no green net
          - bare dry earth surface with granular dirt texture on construction site
          - exposed dry compacted soil area showing raw ground without protective mesh
        prompts_negative:
          - green grass or vegetation covering ground
          - concrete or asphalt paved surface
          - water surface or wet area
        alert:
          enabled: true
          level: info
          description: 检测到裸土

      background:
        zh: 背景
        is_background: true
        prompts:
          - sky and clouds
          - shadow area on ground

# ==============================================================================
# 输出配置
# ==============================================================================
output:
  output_dir: outputs/
  save_masks: true
  save_diff: true
  save_overlay: true
  visualization:
    enabled: true
    font_size: 20
    added_color: [0, 255, 0]
    removed_color: [0, 0, 255]

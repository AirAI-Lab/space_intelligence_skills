# 数据集配置（参考 YOLOv8）
path: ../datasets/my_dataset  # 数据集根目录
train: images/train           # 训练集相对路径
val: images/val               # 验证集相对路径

# 类别信息
names:
  0: person
  1: car
  2: dog
nc: 3  # 类别数量

# 数据增强参数（参考 YOLOv8）
augmentation:
  hsv_h: 0.015    # 色调调整
  hsv_s: 0.7      # 饱和度调整
  hsv_v: 0.4      # 明度调整
  degrees: 0.0    # 旋转角度
  translate: 0.1  # 平移比例
  scale: 0.5      # 缩放因子
  fliplr: 0.5     # 左右翻转概率
  mosaic: 1.0     # 马赛克增强概率
  mixup: 0.0      # 混合增强概率

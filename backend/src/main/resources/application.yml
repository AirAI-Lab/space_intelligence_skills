spring:
  application:
    name: edge-infer-cloud
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true

server:
  port: 8080
  shutdown: graceful

---
spring:
  config:
    activate:
      on-profile: docker
    datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/edge_cloud}
      username: ${SPRING_DATASOURCE_USERNAME:edge_user}
      password: ${SPRING_DATASOURCE_PASSWORD:edge_pass}
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: false
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
  mqtt:
    broker-url: tcp://emqx:1883
    client-id: edge_cloud_backend
    username: admin
    password: admin123456

# 外部访问URL配置（用于设备下载文件）
backend:
  external-url: ${BACKEND_EXTERNAL_URL:http://localhost:8081}
